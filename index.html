<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pablo 60</title>
                 
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#ffffff;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow-x:hidden;
}

.invitation{
position:relative;
width:100%;
max-width:450px;
background:#fff;
border:4px solid #b71c1c;
padding:40px 25px;
text-align:center;
overflow:hidden;
}

.invitation::before{
content:"";
position:absolute;
top:-120px;
left:-120px;
width:250px;
height:250px;
background:#c62828;
border-radius:50%;
opacity:.08;
}

.invitation::after{
content:"";
position:absolute;
bottom:-120px;
right:-120px;
width:250px;
height:250px;
background:#c62828;
border-radius:50%;
opacity:.08;
}

.border{
position:absolute;
top:12px;
left:12px;
right:12px;
bottom:12px;
border:2px solid #c62828;
pointer-events:none;
}

.birthday{
    font-family:'Dancing Script', cursive;
    font-size:60px;
    color:#b71c1c;
    margin-top:15px;
    margin-bottom:5px;
}

.line{
width:90px;
height:2px;
background:#b71c1c;
margin:0 auto 25px;
}
.linea-titulo{
    color:#b71c1c;
    font-size:20px;
    letter-spacing:2px;
    margin-bottom:15px;
}
.name{
    font-size:72px;
    font-family:'Playfair Display', serif;
    font-weight:400;
    color:#b71c1c;
    letter-spacing:2px;
}

.cumple{
font-size:18px;
letter-spacing:8px;
color:#b71c1c;
margin-top:5px;
}

.numero{
    font-family:'Playfair Display', serif;
    font-size:180px;
    font-weight:400;
    line-height:1;
    color:#b71c1c;
}
.frase-arriba{
    font-size:15px;
    font-weight:600;
    color:#b71c1c;
    letter-spacing:1px;
    margin-top:10px;
}

.frase-abajo{
    font-family:'Dancing Script', cursive;
    font-size:38px;
    font-weight:400;
    color:#b71c1c;
    margin-top:5px;
}
.linea-frase{
    width:120px;
    height:2px;
    background:#b71c1c;
    margin:8px auto 0;
}
.info{
margin-top:35px;
display:flex;
justify-content:space-between;
gap:10px;
}

.info-box{
flex:1;
color:#b71c1c;
}

.icon{
font-size:28px;
margin-bottom:10px;
}

.info-box h3{
font-size:12px;
font-weight:700;
margin-bottom:5px;
}

.info-box p{
font-size:11px;
line-height:1.4;
}

.confirmar{
margin-top:35px;
background:#b71c1c;
color:white;
border:none;
padding:16px 30px;
font-size:16px;
font-weight:700;
border-radius:40px;
cursor:pointer;
transition:.3s;
}

.confirmar:hover{
transform:scale(1.05);
}
.mapa{
display:inline-block;
margin-top:10px;
padding:12px 25px;
background:white;
border:2px solid #b71c1c;
color:#b71c1c;
text-decoration:none;
border-radius:30px;
font-weight:700;
}

.mapa:hover{
background:#b71c1c;
color:white;
}
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.formulario{
background:white;
width:100%;
max-width:350px;
padding:25px;
border-radius:20px;
}

.formulario h2{
color:#b71c1c;
margin-bottom:15px;
}

.formulario input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.enviar{
width:100%;
padding:14px;
background:#b71c1c;
color:white;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.invitation{
animation:aparecer 1s ease;
}

</style>
</head>

<body>

<div class="invitation">

<div class="border"></div>

<div class="birthday">
Birthday Party
</div>
<div class="linea-titulo">
──── • ────
</div>
<div class="line"></div>

<div class="name">
PABLO
</div>

<div class="cumple">
CUMPLE
</div>

<div class="numero">
60
</div>

<div class="frase-arriba">
Y LO VAMOS A FESTEJAR
</div>

<div class="frase-abajo">
como se merece
</div>
<div class="linea-frase"></div>
<div class="info">

<div class="info-box">
<div class="icon">📅</div>
<h3>FECHA</h3>
<p>
SÁBADO<br>
14 NOVIEMBRE<br>
2026
</p>
</div>

<div class="info-box">
<div class="icon">🕒</div>
<h3>HORA</h3>
<p>
21:00 HS
</p>
</div>

<div class="info-box">
<div class="icon">📍</div>
<h3>LUGAR</h3>
<p>
SPORTCLUB<br>
CASTELAR<br>
Av. Gaona 6050<br>
(Colectora Sur)
</p>
</div>

</div>

<button class="confirmar" onclick="abrirModal()">
CONFIRMAR ASISTENCIA
</button>
<br><br>

<a
href="https://maps.google.com/?q=Av.+Gaona+6050+Castelar"
target="_blank"
class="mapa"
>
📍 CÓMO LLEGAR
</a>
</div>

<div class="modal" id="modal">

<div class="formulario">

<h2>Confirmar asistencia</h2>

<input
type="text"
id="nombre"
placeholder="Nombre"
/>

<input
type="text"
id="apellido"
placeholder="Apellido"
/>

<button
class="enviar"
onclick="enviarFormulario()"
>
ENVIAR
</button>

</div>

</div>

<script>

function abrirModal(){
document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}
function enviarFormulario(){

let nombre =
document.getElementById("nombre").value;

let apellido =
document.getElementById("apellido").value;

if(nombre === "" || apellido === ""){
alert("Por favor completa todos los campos");
return;
}

fetch("https://script.google.com/macros/s/AKfycbwTSHfDI6dAlilq_kn06nX7lw6geCKIkV83L_Ce8psB7rxmHWgppq_hfSC1tCdvg5Hg/exec", {
    method: "POST",
    body: new URLSearchParams({
        nombre: nombre,
        apellido: apellido
    })
})
.then(() => {
    alert("¡Gracias " + nombre + " " + apellido + "! Tu asistencia fue registrada.");
    
    document.getElementById("nombre").value = "";
    document.getElementById("apellido").value = "";
    
    cerrarModal();
})
.catch(() => {
    alert("Error al registrar la asistencia");
});

}

/* Cerrar modal tocando afuera */

window.onclick = function(event){

const modal =
document.getElementById("modal");

if(event.target === modal){
cerrarModal();
}

}

</script>

</body>
</html>
